<body>
  <main class="container">
    <header class="header">
      <h1>Link Opener</h1>
      <img src="https://cloud.umami.is/p/z2gxHTGdp" alt="" width="0" height="0" aria-hidden="true" style="position:absolute;width:0;height:0;opacity:0;">
      <nav aria-label="Language switcher">
        <a href="link-opener-kr.html" class="lang-switch" hreflang="ko" lang="ko" title="한국어 (Korean)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">

          </svg>
          <span>KR</span>
        </a>
      </nav>
    </header>
    <p class="subtitle">Extract, select, and open multiple links at once</p>

    <section aria-label="Link input area">
      <label for="inputArea" class="visually-hidden">Paste HTML or text containing links</label>
      <textarea id="inputArea" placeholder="Paste HTML or text containing links here..." aria-describedby="summary"></textarea>
    </section>

    <section id="linkList" class="link-list" aria-label="Detected links" role="list"></section>

    <p id="summary" class="summary" role="status" aria-live="polite">No links detected yet.</p>

    <nav class="button-group" aria-label="Actions">
      <button id="btnSelectAll" class="btn btn-secondary" disabled type="button">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="9,11 12,14 22,4"></polyline>
          <path d="M21,12v7a2,2,0,0,1-2,2H5a2,2,0,0,1-2-2V5A2,2,0,0,1,5,3h11"></path>
        </svg>
        Select all
      </button>
      <button id="btnClearSelection" class="btn btn-secondary" disabled type="button">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
        </svg>
        Deselect all
      </button>
      <button id="btnClear" class="btn btn-danger" disabled type="button">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="3,6 5,6 21,6"></polyline>
          <path d="M19,6v14a2,2,0,0,1-2,2H7a2,2,0,0,1-2-2V6m3,0V4a2,2,0,0,1,2-2h4a2,2,0,0,1,2,2v2"></path>
        </svg>
        Clear
      </button>
      <button id="btnDownload" class="btn btn-primary" disabled type="button">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21,15v4a2,2,0,0,1-2,2H5a2,2,0,0,1-2-2v-4"></path>
          <polyline points="7,10 12,15 17,10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
        Download
      </button>
      <button id="btnOpen" class="btn btn-primary" disabled type="button">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M18,13v6a2,2,0,0,1-2,2H5a2,2,0,0,1-2-2V8A2,2,0,0,1,5,6h6"></path>
          <polyline points="15,3 21,3 21,9"></polyline>
          <line x1="10" y1="14" x2="21" y2="3"></line>
        </svg>
        Open
      </button>
